<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<title>登录用户卡片 · 浅色 + 深色</title>
<meta name="viewport" content="width=1280" />
<link rel="stylesheet" href="user-card.css" />
<template id="__bundler_thumbnail" data-bg-color="#f3f1ec">
  <svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
    <rect x="20" y="20" width="160" height="100" rx="14" fill="#fff1e0" stroke="#ece5d6"/>
    <circle cx="55" cy="60" r="20" fill="#ffd9a3" stroke="#ffaf78" strokeWidth="1.5"/>
    <rect x="85" y="48" width="60" height="10" rx="2" fill="#1f1b18"/>
    <rect x="85" y="64" width="40" height="10" rx="5" fill="#fff1d9" stroke="#ffe2af"/>
    <rect x="40" y="92" width="120" height="18" rx="6" fill="none" stroke="#ece5d6"/>
  </svg>
</template>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  .uc-stage {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
  }
  .uc-stage.is-light { background: #f3f1ec; }
  .uc-stage.is-dark  { background: #0d0c0b; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="user-card.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="card" title="登录用户卡片 · 1:1 复刻" subtitle="左下角主界面用户卡 · 浅色 / 深色">
        <DCArtboard id="light" label="浅色" width={520} height={360}>
          <div className="uc-stage is-light">
            <UserCard theme="light"/>
          </div>
        </DCArtboard>
        <DCArtboard id="dark" label="深色" width={520} height={360}>
          <div className="uc-stage is-dark">
            <UserCard theme="dark"/>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
